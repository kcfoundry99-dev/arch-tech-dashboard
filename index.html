<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Foundry | Architecture & Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Outfit:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f7;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --gold: #b8956e;
            --border: #e8e6e3;
        }
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .btn-filter {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .btn-filter:hover { border-color: var(--gold); color: var(--text); }
        .btn-filter.active { background: var(--text); color: white; border-color: var(--text); }
        
        .card-article {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            transition: all 0.3s;
        }
        .card-article:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        
        .tag-category {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold);
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <header class="bg-white border-b border-[#e8e6e3] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div>
                <h1 class="font-serif text-2xl font-medium">X Foundry</h1>
                <p class="text-xs text-[var(--text-muted)] mt-1">建築科技與房產前沿</p>
            </div>
            <span class="text-xs text-[var(--text-muted)]" id="lastUpdate"></span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-4 mb-10">
            <div class="text-center">
                <div class="font-serif text-3xl font-medium" id="totalNews">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">文章</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#4895ef]" id="dfCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">數位製造</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#10b981]" id="prefabCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">預鑄模組</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#8b5cf6]" id="aiCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">AI應用</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="flex flex-wrap gap-2 mb-10">
            <button onclick="filter('all')" class="btn-filter active" data-filter="all">全部</button>
            <button onclick="filter('saved')" class="btn-filter" data-filter="saved">收藏</button>
            <button onclick="filter('lifestyle')" class="btn-filter" data-filter="lifestyle">房產開發</button>
            <button onclick="filter('ai')" class="btn-filter" data-filter="ai">AI應用</button>
            <button onclick="filter('df')" class="btn-filter" data-filter="df">數位製造</button>
            <button onclick="filter('prefab')" class="btn-filter" data-filter="prefab">預鑄模組</button>
            <button onclick="filter('automation')" class="btn-filter" data-filter="automation">自動化</button>
            <button onclick="filter('bim')" class="btn-filter" data-filter="bim">BIM</button>
        </div>

        <!-- Articles -->
        <div id="articles" class="grid gap-4"></div>
    </main>

    <!-- Analysis -->
    <section class="max-w-6xl mx-auto px-6 pb-12">
        <h2 class="font-serif text-xl mb-6">相關分析</h2>
        <button onclick="analyze()" class="px-6 py-3 bg-[#1a1a1a] text-white text-sm rounded">分析</button>
        <div id="analysisResult" class="mt-6 grid gap-4"></div>
    </section>

    <script>
        let currentFilter = 'all';
        let saved = JSON.parse(localStorage.getItem('saved') || '[]');

        const articles = [
            {title: "One Beverly Hills - 17.5英畝超豪華生活社區", category: "lifestyle", source: "Multi-Housing News", url: "https://www.multihousingnews.com/beverly-hills-mixed-use-development-gets-4-3b-in-financing/", summary: "$100億美元項目，結合Aman酒店與住宅、園林設計，打造頂級生活體驗。", date: "2026-03-27"},
            {title: "West Edge - 洛杉矶獲獎混合用途社區", category: "lifestyle", source: "LA Business Journal", url: "https://labusinessjournal.com/business-journal-events/2024-commercial-real-estate-awards-mixed-use/", summary: "PCBC Gold Nugget Grand Prize獲獎項目，WELL Core & Shell認證。", date: "2026-03-26"},
            {title: "The Dallas EDITION - 精品酒店與豪華住宅", category: "lifestyle", source: "Dallas Innovates", url: "https://dallasinnovates.com/edition-hotel-residences-to-be-centerpiece-of-uptown-dallas-chalk-hill-development/", summary: "五星級EDITION酒店+60戶豪華住宅，直接連接Katy Trail。", date: "2026-03-25"},
            {title: "Nantou Hybrid Building - 深圳城市活化典範", category: "lifestyle", source: "Dezeen Awards", url: "https://www.dezeen.com/awards/2024/winners/categories/architecture/mixed-use-project-of-the-year/", summary: "Urbanus Architecture設計，榮獲2024 Dezeen「年度混合用途項目」。", date: "2026-03-24"},
            {title: "Knox & McKinney - 達拉斯精品辦公與零售", category: "lifestyle", source: "Trammell Crow", url: "https://www.trammellcrow.com/newsroom/knox-street-enters-its-next-evolution-with-knox-and-mckinney", summary: "2026年3月動工，精品辦公空間與精選零售餐飲。", date: "2026-03-23"},
            {title: "94% AEC專業人士將在2026年增加AI使用", category: "ai", source: "ASCE", url: "https://www.asce.org/publications-and-news/civil-engineering-source/article/2025/12/18/architecture-engineering-construction-sector-slow-to-adapt-ai-survey-shows", summary: "雖僅27%使用AI，但94%預期在2026年增加應用。", date: "2026-03-26"},
            {title: "生成式AI助力建築設計優化", category: "ai", source: "Forbes", url: "https://www.forbes.com/sites/kathleenwalch/2025/06/04/from-concept-to-construction-the-impact-of-ai-in-architecture/", summary: "AI驅動軟體包括生成式設計工具，根據成本、永續性優化設計。", date: "2026-03-25"},
            {title: "AI結合穿戴裝置提升工地安全", category: "ai", source: "Safety Tech", url: "https://beehiveinsurance.com/blog/2025/03/17/the-impact-of-ai-on-construction-in-2025-and-2026/", summary: "AI動力穿戴裝置和電腦視覺系統即時監測工地，預測事故。", date: "2026-03-24"},
            {title: "3D混凝土列印技術突破：多層建築時代", category: "df", source: "Construction Technology", url: "https://www.conexpoconagg.com/news/top-3-construction-technology-trends-to-watch-in-2", summary: "3D混凝土列印已從小型原型進展到多層建築、橋梁。", date: "2026-03-27"},
            {title: "數位孿生技術整合BIM與AI預測維護", category: "bim", source: "Digital Builder", url: "https://www.vectorworks.net/en-US/newsroom/future-architecture-trends", summary: "數位孿生結合BIM和AI用於預測性維護和資產管理。", date: "2026-03-23"},
            {title: "預鑄建築效率提升50%", category: "prefab", source: "Prefab Expert", url: "https://www.msuite.com/prefabrication-in-2026-why-industrialized-construction-is-becoming-the-standard/", summary: "工廠環境製造建築構件，項目完成速度提升達50%。", date: "2026-03-25"},
            {title: "全球模組化建築市場2026年突破1800億美元", category: "prefab", source: "GM Insights", url: "https://www.gminsights.com/industry-analysis/modular-and-prefabricated-construction-market", summary: "全球模組化和預鑄建築市場預計達180.3億美元。", date: "2026-03-27"}
        ];

        function render() {
            let filtered = currentFilter === 'all' ? articles : currentFilter === 'saved' ? articles.filter((_, i) => saved.includes(i)) : articles.filter(a => a.category === currentFilter);
            
            document.getElementById('totalNews').textContent = articles.length;
            document.getElementById('dfCount').textContent = articles.filter(a => a.category === 'df').length;
            document.getElementById('prefabCount').textContent = articles.filter(a => a.category === 'prefab').length;
            document.getElementById('aiCount').textContent = articles.filter(a => a.category === 'ai').length;
            
            document.getElementById('articles').innerHTML = filtered.map((a, i) => `
                <div class="card-article">
                    <div class="tag-category">${a.source} · ${a.date}</div>
                    <h3 class="font-serif text-lg font-medium mb-3">${a.title}</h3>
                    <p class="text-sm text-[var(--text-muted)] mb-4 leading-relaxed">${a.summary}</p>
                    <div class="flex justify-between items-center">
                        <div class="flex gap-4 text-xs">
                            <button onclick="toggleSave(${i})" class="${saved.includes(i) ? 'text-[var(--gold)]' : 'text-[var(--text-muted)]'} hover:text-[var(--gold)]">${saved.includes(i) ? '★ 已收藏' : '☆ 收藏'}</button>
                            <a href="${a.url}" target="_blank" class="text-[var(--text-muted)] hover:text-[var(--gold)]">原文</a>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW', {month:'numeric', day:'numeric'});
        }

        function filter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.toggle('active', b.dataset.filter === cat));
            render();
        }

        function toggleSave(i) {
            saved = saved.includes(i) ? saved.filter(x => x !== i) : [...saved, i];
            localStorage.setItem('saved', JSON.stringify(saved));
            render();
        }

        function analyze() {
            const rel = articles.filter(a => ['df', 'prefab', 'ai', 'automation', 'lifestyle'].includes(a.category));
            document.getElementById('analysisResult').innerHTML = `
                <div class="bg-white border border-[#e8e6e3] p-6">
                    <h3 class="font-serif text-lg mb-4">相關商機</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="p-4 bg-[#faf9f7]">
                            <p class="font-medium mb-2">房產開發</p>
                            <p class="text-[var(--text-muted)]">${rel.filter(a => a.category === 'lifestyle').length}篇 - 國際頂級案例可借鏡</p>
                        </div>
                        <div class="p-4 bg-[#faf9f7]">
                            <p class="font-medium mb-2">AI應用</p>
                            <p class="text-[var(--text-muted)]">${rel.filter(a => a.category === 'ai').length}篇 - 94% AEC將增加使用</p>
                        </div>
                        <div class="p-4 bg-[#faf9f7]">
                            <p class="font-medium mb-2">預鑄技術</p>
                            <p class="text-[var(--text-muted)]">${rel.filter(a => a.category === 'prefab').length}篇 - 市場1800億美元</p>
                        </div>
                        <div class="p-4 bg-[#faf9f7]">
                            <p class="font-medium mb-2">數位製造</p>
                            <p class="text-[var(--text-muted)]">${rel.filter(a => a.category === 'df').length}篇 - 3D列印技術突破</p>
                        </div>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
