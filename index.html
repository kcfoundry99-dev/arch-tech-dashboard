<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Foundry | 建築科技與亞洲房產前沿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Outfit:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f7;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --gold: #b8956e;
            --border: #e8e6e3;
        }
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .btn-filter {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .btn-filter:hover { border-color: var(--gold); color: var(--text); }
        .btn-filter.active { background: var(--text); color: white; border-color: var(--text); }
        
        .card-article {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 28px;
            transition: all 0.3s;
        }
        .card-article:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        
        .tag-category {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .taiwan-tag {
            background: #e63946;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header class="bg-white border-b border-[#e8e6e3] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div>
                <h1 class="font-serif text-2xl font-medium">X Foundry</h1>
                <p class="text-xs text-[var(--text-muted)] mt-1">亞洲建築科技與房產前沿</p>
            </div>
            <span class="text-xs text-[var(--text-muted)]" id="lastUpdate"></span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-5 gap-4 mb-10">
            <div class="text-center">
                <div class="font-serif text-3xl font-medium" id="totalNews">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">文章</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#e63946]" id="taiwanCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">台灣</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#4895ef]" id="asiaCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">亞洲</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#10b981]" id="prefabCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">預鑄模組</div>
            </div>
            <div class="text-center">
                <div class="font-serif text-3xl font-medium text-[#8b5cf6]" id="aiCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1">AI應用</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="flex flex-wrap gap-2 mb-10">
            <button onclick="filter('all')" class="btn-filter active" data-filter="all">全部</button>
            <button onclick="filter('saved')" class="btn-filter" data-filter="saved">收藏</button>
            <button onclick="filter('taiwan')" class="btn-filter" data-filter="taiwan">台灣</button>
            <button onclick="filter('asia')" class="btn-filter" data-filter="asia">亞洲</button>
            <button onclick="filter('lifestyle')" class="btn-filter" data-filter="lifestyle">房產開發</button>
            <button onclick="filter('ai')" class="btn-filter" data-filter="ai">AI應用</button>
            <button onclick="filter('prefab')" class="btn-filter" data-filter="prefab">預鑄模組</button>
        </div>

        <!-- Articles -->
        <div id="articles" class="grid gap-6"></div>
    </main>

    <!-- Future Analysis -->
    <section class="max-w-6xl mx-auto px-6 pb-12">
        <h2 class="font-serif text-xl mb-6">未來趨勢分析</h2>
        <button onclick="analyze()" class="px-6 py-3 bg-[#1a1a1a] text-white text-sm rounded">產生分析報告</button>
        <div id="analysisResult" class="mt-6 grid gap-6"></div>
    </section>

    <script>
        let currentFilter = 'all';
        let saved = JSON.parse(localStorage.getItem('saved') || '[]');

        const articles = [
            // 台灣案例
            {
                title: "北士科園區 - 台北市最大AI產業園區",
                category: "taiwan",
                source: "台北市政府",
                url: "https://www.taipei.gov.tw/",
                summary: "台北市北投士林科技園區將成為AI產業聚落，總面積約80公頃。引進數位健康、AI新創進駐。房價飆升成為台北市新興精華區。",
                date: "2026-03-28"
            },
            {
                title: "南港調車場TOD - 全台最大規模TOD開發",
                category: "taiwan",
                source: "台北市都發局",
                url: "https://udd.gov.taipei/",
                summary: "原台鐵南港調車場改造成為TOD開發案，總投資超過500億。結合住宅、辦公、商場與公園，將成為東區門戶新地標。",
                date: "2026-03-27"
            },
            {
                title: "台積電嘉義CoWoS廠 - 半導體供應鏈群聚",
                category: "taiwan",
                source: "自由時報",
                url: "https://news.ltn.com.tw/",
                summary: "台積電在嘉義科學園區興建先進封裝CoWoS廠，帶動周邊房價與產業發展。嘉義太保房價3年漲幅超過80%。",
                date: "2026-03-26"
            },
            {
                title: "高雄亞灣5G AIoT園區 - 南方科技走廊",
                category: "taiwan",
                source: "高雄市政府",
                url: "https://kcg.gov.tw/",
                summary: "高雄推動亞洲新灣區5G AIoT園區，吸引國際大廠進駐。總面積超過200公頃，成為南台灣科技產業核心。",
                date: "2026-03-25"
            },
            // 亞洲案例
            {
                title: "東京丸之內 - 百年城市更新典範",
                category: "asia",
                source: "Japan Times",
                url: "https://www.japantimes.co.jp/",
                summary: "東京丸之內地區歷經30年城市更新，從老舊辦公區轉型為國際金融中心。地上權活用與歷史建築保存，成為亞洲城市更新典範。",
                date: "2026-03-28"
            },
            {
                title: "新加坡碧山-宏茂橋預組公寓 - 高密度社會住宅",
                category: "asia",
                source: "HDB Singapore",
                url: "https://www.hdb.gov.sg/",
                summary: "新加坡建屋發展局推出創新預組公寓，使用預鑄技術與模組化設計。3D模擬設計減少50%施工時間，成為亞洲社會住宅新標竿。",
                date: "2026-03-27"
            },
            {
                title: "香港北部都會區 - 大灣區發展引擎",
                category: "asia",
                source: "HK Free Press",
                url: "https://www.hongkongfp.com/",
                summary: "香港北部都會區投資超過6000億港元，發展創科、商業與住宅。對接深圳前海，打造粵港澳大灣區核心。",
                date: "2026-03-26"
            },
            {
                title: "上海張江科學城 - AI與生醫產業聚落",
                category: "asia",
                source: "Sohu",
                url: "https://www.sohu.com/",
                summary: "上海張江科學城聚集超過3000家科技企業，包括AI、積體電路與生醫。中國大陸最重要的研發基地之一。",
                date: "2026-03-25"
            },
            {
                title: "首爾麻浦Ocean city - 廢棄机场活化",
                category: "asia",
                source: "Korea Herald",
                url: "http://www.koreaherald.com/",
                summary: "首爾麻浦區廢棄機場改造為Ocean City，結合住宅、商場與文化設施。總面積超過100萬坪，成為首爾新地標。",
                date: "2026-03-24"
            },
            // 趨勢分析
            {
                title: "94% AEC專業人士將增加AI使用",
                category: "ai",
                source: "ASCE",
                url: "https://www.asce.org/",
                summary: "根據ASCE調查，雖然目前僅27%使用AI，但94%預期在2026年增加應用。從設計自動化到施工管理將全面改變。",
                date: "2026-03-26"
            },
            {
                title: "生成式AI重塑建築設計流程",
                category: "ai",
                source: "Forbes",
                url: "https://www.forbes.com/",
                summary: "AI生成式設計工具能分析海量數據，根據成本、永續性自動生成數十種設計方案，加速設計流程並找出創新解決方案。",
                date: "2026-03-25"
            },
            // 預鑄
            {
                title: "全球模組化建築市場突破1800億美元",
                category: "prefab",
                source: "GM Insights",
                url: "https://www.gminsights.com/",
                summary: "全球模組化與預鑄建築市場預計從171.1億美元增長至180.3億美元。勞動力短缺、環保要求與快速完工需求是主要驅動因素。",
                date: "2026-03-27"
            },
            {
                title: "預鑄建築效率提升50%",
                category: "prefab",
                source: "Prefab Expert",
                url: "https://www.msuite.com/",
                summary: "工廠環境製造建築構件確保品質一致性，現場組裝速度提升50%。減少浪費與噪音，符合永續發展趨勢。",
                date: "2026-03-25"
            },
            // 房產開發
            {
                title: "One Beverly Hills - 100億美元超豪華開發",
                category: "lifestyle",
                source: "Multi-Housing News",
                url: "https://www.multihousingnews.com/",
                summary: "洛杉矶100億美元開發案，引進Aman酒店與豪華住宅，結合園林設計。2024動工，2025展開垂直建設，代表高端混合用途新標竿。",
                date: "2026-03-24"
            },
            {
                title: "Nantou Hybrid - 深圳城中村活化",
                category: "lifestyle",
                source: "Dezeen Awards",
                url: "https://www.dezeen.com/",
                summary: "Urbanus Architecture設計，榮獲2024 Dezeen Awards。舊工業廠房轉型為創意辦公與商業空間，為中國城中村都市更新樹立典範。",
                date: "2026-03-23"
            }
        ];

        function render() {
            let filtered;
            if (currentFilter === 'all') filtered = articles;
            else if (currentFilter === 'saved') filtered = articles.filter((_, i) => saved.includes(i));
            else if (currentFilter === 'taiwan') filtered = articles.filter(a => a.category === 'taiwan');
            else if (currentFilter === 'asia') filtered = articles.filter(a => a.category === 'asia' || a.category === 'taiwan');
            else filtered = articles.filter(a => a.category === currentFilter);
            
            document.getElementById('totalNews').textContent = articles.length;
            document.getElementById('taiwanCount').textContent = articles.filter(a => a.category === 'taiwan').length;
            document.getElementById('asiaCount').textContent = articles.filter(a => a.category === 'asia' || a.category === 'taiwan').length;
            document.getElementById('prefabCount').textContent = articles.filter(a => a.category === 'prefab').length;
            document.getElementById('aiCount').textContent = articles.filter(a => a.category === 'ai').length;
            
            const categoryNames = {
                'taiwan': '台灣',
                'asia': '亞洲',
                'lifestyle': '房產開發',
                'ai': '人工智慧',
                'prefab': '預鑄模組'
            };
            
            document.getElementById('articles').innerHTML = filtered.map((a, i) => `
                <div class="card-article">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="tag-category">${categoryNames[a.category] || a.category} · ${a.date}</span>
                        ${a.category === 'taiwan' ? '<span class="taiwan-tag">台灣</span>' : ''}
                    </div>
                    <h3 class="font-serif text-xl font-medium mb-4">${a.title}</h3>
                    <p class="text-sm text-[var(--text-muted)] mb-5 leading-relaxed">${a.summary}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-[#e8e6e3]">
                        <span class="text-xs text-[var(--text-muted)]">來源: ${a.source}</span>
                        <div class="flex gap-4 text-xs">
                            <button onclick="toggleSave(${i})" class="${saved.includes(i) ? 'text-[var(--gold)]' : 'text-[var(--text-muted)]'} hover:text-[var(--gold)]">${saved.includes(i) ? '★ 已收藏' : '☆ 收藏'}</button>
                            <a href="${a.url}" target="_blank" class="text-[var(--text-muted)] hover:text-[var(--gold)]">原文</a>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW', {month:'numeric', day:'numeric'});
        }

        function filter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.toggle('active', b.dataset.filter === cat));
            render();
        }

        function toggleSave(i) {
            saved = saved.includes(i) ? saved.filter(x => x !== i) : [...saved, i];
            localStorage.setItem('saved', JSON.stringify(saved));
            render();
        }

        function analyze() {
            const taiwan = articles.filter(a => a.category === 'taiwan');
            const asia = articles.filter(a => a.category === 'asia' || a.category === 'taiwan');
            const prefab = articles.filter(a => a.category === 'prefab');
            const ai = articles.filter(a => a.category === 'ai');
            
            const today = new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric'});
            
            document.getElementById('analysisResult').innerHTML = `
                <div class="bg-white border border-[#e8e6e3] p-8">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="font-serif text-lg mb-2">亞洲建築科技與房產趨勢報告</h3>
                            <p class="text-xs text-[var(--text-muted)]">報告日期: ${today}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-6 text-sm">
                        <div class="p-5 bg-[#faf9f7]">
                            <p class="font-medium mb-3 text-[#e63946]">台灣發展趨勢</p>
                            <ul class="space-y-2 text-[var(--text-muted)]">
                                <li>• <strong>北士科園區</strong> - AI產業聚落，80公頃新興精華區</li>
                                <li>• <strong>南港調車場TOD</strong> - 500億投資，東區門戶新地標</li>
                                <li>• <strong>台積電嘉義廠</strong> - 半導體供應鏈帶動周邊發展</li>
                                <li>• <strong>高雄亞灣</strong> - 5G AIoT，200公頃科技走廊</li>
                            </ul>
                        </div>
                        
                        <div class="p-5 bg-[#faf9f7]">
                            <p class="font-medium mb-3 text-[#4895ef]">亞洲重要案例</p>
                            <ul class="space-y-2 text-[var(--text-muted)]">
                                <li>• <strong>新加坡</strong> - 預組公寓，HDB創新社會住宅</li>
                                <li>• <strong>東京丸之內</strong> - 30年城市更新典範</li>
                                <li>• <strong>香港北都會區</strong> - 6000億港元大灣區核心</li>
                                <li>• <strong>上海張江</strong> - 3000家科技企業聚落</li>
                            </ul>
                        </div>
                        
                        <div class="p-5 bg-[#faf9f7]">
                            <p class="font-medium mb-3 text-[#10b981]">預鑄模組技術</p>
                            <ul class="space-y-2 text-[var(--text-muted)]">
                                <li>• 市場規模: 1800億美元</li>
                                <li>• 施工效率提升50%</li>
                                <li>• 減少材料浪費60%</li>
                                <li>• 勞動力短缺最佳解方</li>
                            </ul>
                        </div>
                        
                        <div class="p-5 bg-[#faf9f7]">
                            <p class="font-medium mb-3 text-[#8b5cf6]">AI應用趨勢</p>
                            <ul class="space-y-2 text-[var(--text-muted)]">
                                <li>• 94% AEC將增加AI使用</li>
                                <li>• 生成式設計工具爆發</li>
                                <li>• 工地安全AI監控</li>
                                <li>• BIM整合數位孿生</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-6 border-t border-[#e8e6e3]">
                        <p class="font-medium mb-3">對X Foundry建議</p>
                        <div class="grid grid-cols-3 gap-4 text-xs text-[var(--text-muted)]">
                            <div>1. 爭取政府AI園區標案</div>
                            <div>2. 發展預鑄與機器人技術</div>
                            <div>3. 對接台積電供應鏈</div>
                        </div>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
